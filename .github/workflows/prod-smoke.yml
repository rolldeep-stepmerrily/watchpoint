name: Prod smoke (Claude orchestrated)

# Claude /schedule가 매일 KST 01시에 깨어나서 gh CLI로 trigger.
# cron 스케줄은 의도적으로 제외 — Claude가 트리거 + 결과 분석 + fix PR을 한 번에 수행.
on:
  workflow_dispatch:

jobs:
  smoke:
    name: prod Playwright smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @watchpoint/e2e exec playwright install --with-deps chromium

      - name: Run prod smoke
        id: smoke
        env:
          E2E_BASE_URL: https://o-watchpoint.com
          CI: 'true'
        run: pnpm --filter @watchpoint/e2e exec playwright test specs/prod-smoke.spec.ts --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const title = `[prod-smoke] ${today} 실패`;
            const body = [
              `Daily prod smoke (Playwright) 실패. 자세한 로그/스크린샷은 워크플로 실행 페이지의 \`playwright-report\` 아티팩트 참고.`,
              ``,
              `- 실행: ${runUrl}`,
              `- 대상: https://o-watchpoint.com`,
              `- 워크플로: \`.github/workflows/prod-smoke.yml\``,
              ``,
              `다음 세션에서 이 이슈를 보고 원인을 추적해 fix PR을 올린다.`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'prod-smoke',
              per_page: 5,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `또 실패. 실행: ${runUrl}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['prod-smoke'],
            });
