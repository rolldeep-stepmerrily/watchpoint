version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    target-branch: develop
    commit-message:
      prefix: chore
      include: scope
    groups:
      sentry:
        patterns: ["@sentry/*"]
      nestjs:
        patterns: ["@nestjs/*"]
      prisma:
        patterns: ["@prisma/*", "prisma"]
      nextjs:
        patterns: ["next", "@next/*", "eslint-config-next"]
      types:
        patterns: ["@types/*"]
      biome:
        patterns: ["@biomejs/*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    target-branch: develop
    commit-message:
      prefix: chore
      include: scope
